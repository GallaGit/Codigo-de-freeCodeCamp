<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño de Breadcrumbs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Breadcrumbs with slashes -->
    <div class="breadcrumbs">
        Home / Electronics / Phones / Smartphone XYZ
      </div>
      <!-- Breadcrumbs with greater than symbols -->
      <div class="breadcrumbs-2">
        Home &gt; Electronics &gt; Phones &gt; Smartphone XYZ
      </div>
      <!-- Breadcrumbs with navigation links -->
      <nav class="main-nav">
        <a href="#">Home</a>
        <a href="#">Electronics</a>
        <a href="#">Phones</a>
      </nav>
      <div class="breadcrumbs">
        Home &gt; Electronics &gt; Phones &gt; Smartphone XYZ
      </div>

</body>
</html>
